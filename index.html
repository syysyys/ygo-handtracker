<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手札トラッカー</title>
<style>
body {
    font-family: sans-serif;
    background: #111;
    color: white;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
}
h1 {
    margin-top: 20px;
}
#handList {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}
.card {
    margin: 10px;
    padding: 10px;
    border: 1px solid white;
}
#buttonArea {
    padding: 10px;
    background: #222;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    overflow-y: auto;
}
button {
    padding: 18px 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #444;
    color: white;
}
#controlArea {
    padding: 10px;
    background: #111;
}

.reset {
    background: crimson;
    font-weight: bold;
}
button:active {
    transform: scale(0.96);
}
.reset {
    background: crimson;
    color: white;
}
</style>
</head>
<body>

<h1>相手の確定手札</h1>

<div id="handList"></div>

<div id="buttonArea"></div>

<script>
let hand = {};

const cardList = [
  "うらら",
  "増G",
  "ニビル",
  "ラゼン",
  "マッドラヴ",
  "ジャオロン",
  "イヅナ",
  "ヨクル",
  "ランタン",
  "ルプス",
  "ホーリー・スー",
  "ノロイ",
  "プルトン",
  "ボーガー",
  "ヴァリウス",
  "増援",
  "Stake",
  "Start",
  "Case of K9",
  "強制解除",
  "スノーデビル",
  "墓穴",
  "抹殺",
  "三戦",
  "DDクロウ"
];

function createButtons() {
    const area = document.getElementById("buttonArea");
    cardList.forEach(card => {
        const btn = document.createElement("button");
        btn.textContent = card;
        btn.onclick = () => addCard(card);
        area.appendChild(btn);
    });
}

function addCard(name) {
    if (hand[name]) {
        hand[name]++;
    } else {
        hand[name] = 1;
    }
    render();
}

function removeCard(name) {
    if (hand[name]) {
        hand[name]--;
        if (hand[name] <= 0) {
            delete hand[name];
        }
        render();
    }
}

function resetHand() {
    hand = {};
    render();
}

function render() {
    const list = document.getElementById("handList");
    list.innerHTML = "";

    for (let card in hand) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `${card} ×${hand[card]} 
        <button onclick="removeCard('${card}')">−</button>`;
        list.appendChild(div);
    }
}

createButtons();
</script>


<br>

<div id="controlArea">
    <button class="reset" onclick="resetHand()">リセット</button>
</div>

</body>
</html>
