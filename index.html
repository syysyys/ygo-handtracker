<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手札トラッカー</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #111;
    color: white;
}
h1 {
    margin-top: 20px;
}
#handList {
    margin: 20px;
    font-size: 20px;
}
.card {
    margin: 10px;
    padding: 10px;
    border: 1px solid white;
}
button {
    margin: 5px;
    padding: 15px;
    font-size: 16px;
}
.reset {
    background: crimson;
    color: white;
}
</style>
</head>
<body>

<h1>相手の確定手札</h1>

<div id="handList"></div>

<div id="buttonArea"></div>

<script>
let hand = {};

const cardList = [
  "うらら",
  "増G",
  "ニビル",
  "ラゼン",
  "マッドラヴ",
  "ジャオロン",
  "イヅナ",
  "ヨクル",
  "ランタン",
  "ルプス",
  "ホーリー・スー",
  "ノロイ",
  "プルトン",
  "ボーガー",
  "ヴァリウス",
  "増援",
  "Stake",
  "Start",
  "Case of K9",
  "強制解除",
  "スノーデビル",
  "墓穴",
  "抹殺",
  "三戦",
  "DDクロウ"
];

function createButtons() {
    const area = document.getElementById("buttonArea");
    cardList.forEach(card => {
        const btn = document.createElement("button");
        btn.textContent = card;
        btn.onclick = () => addCard(card);
        area.appendChild(btn);
    });
}

function addCard(name) {
    if (hand[name]) {
        hand[name]++;
    } else {
        hand[name] = 1;
    }
    render();
}

function removeCard(name) {
    if (hand[name]) {
        hand[name]--;
        if (hand[name] <= 0) {
            delete hand[name];
        }
        render();
    }
}

function resetHand() {
    hand = {};
    render();
}

function render() {
    const list = document.getElementById("handList");
    list.innerHTML = "";

    for (let card in hand) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `${card} ×${hand[card]} 
        <button onclick="removeCard('${card}')">−</button>`;
        list.appendChild(div);
    }
}

createButtons();
</script>


<br>

<button class="reset" onclick="resetHand()">リセット</button>

}

}

    list.innerHTML = "";

    for (let card in hand) {
        const div = document.createElement("div");

        div.innerHTML = `${card} ×${hand[card]} 
        <button onclick="removeCard('${card}')">−</button>`;
        list.appendChild(div);
    }
}
</script>

</body>
</html>
